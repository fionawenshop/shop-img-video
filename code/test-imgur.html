<title>FionaWen</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:Arial,sans-serif;background:#fff}
.container{max-width:1000px;margin:0 auto;padding:20px}
.main-title{text-align:center;font-size:28px;margin:30px 0;color:#222}

.product{margin-bottom:50px;padding-bottom:20px;border-bottom:1px solid #eee}
.product-title{
    text-align:center;
    font-size:18px;
    margin:15px 0;
    color:#000;
    cursor:pointer;
    font-weight:bold;
    text-decoration:underline;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
}
.grid-item{
    aspect-ratio:1;
    background:#000;
    border-radius:6px;
    overflow:hidden;
    position:relative;
    cursor:pointer;
}
.grid-item img{
    width:100%;height:100%;object-fit:cover
}
.grid-item .more{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    font-weight:bold;
}

.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.95);
    z-index:9999;
    padding:10px;
    overflow-y:auto;
}
.modal-close{
    position:fixed;
    top:15px;right:15px;
    color:#fff;
    font-size:36px;
    cursor:pointer;
    z-index:9999
}
.modal-content{
    max-width:500px;
    margin:40px auto;
}
.modal-media{
    margin-bottom:12px;
    border-radius:8px;
    overflow:hidden;
    background:#000;
    width:100%;
}
.modal-media img{
    width:100%;
    height:auto;
    display:block;
}

/* 竖屏 9:16 手机专用 */
.video-wrapper {
    position: relative;
    width: 100%;
    padding-top: 177.77%;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom:12px;
}
.video-wrapper iframe {
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    border:none;
}

.pagination{
    text-align:center;
    margin:40px 0;
}
.pagination button{
    padding: 10px 20px;
    font-size:15px;
    margin:0 8px;
    border:none;
    background:#222;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
}
.pagination button:disabled{
    background:#ccc;
}
#pageInfo{
    font-size:16px;
}
</style>
</head>

const perPage = 10;
let currentPage = 1;
let currentPageProducts = [];

function renderProducts(){
    const container = document.getElementById('productList');
    container.innerHTML = '';
    
    const start = (currentPage-1)*perPage;
    const end = currentPage*perPage;
    currentPageProducts = allProducts.slice(start, end);
    
    currentPageProducts.forEach((item, idx) => {
        const [prodName, medias] = item;
        let gridHTML = '';
        const showItems = medias.slice(0,9);
        const extraCount = medias.length - 9;

        showItems.forEach((m, idx2) => {
            if (!m.mimeType.includes('video')) {
                gridHTML += `
<div class="grid-item" onclick="openModal(${idx})">
    ${m.isImgur 
        ? `<img 
            src="https://i.imgur.com/${m.id}.jpg" 
            alt="${prodName}" 
            loading="lazy" 
            width="800" height="800">`
        : `<img 
            src="https://lh3.googleusercontent.com/d/${m.id}" 
            alt="${prodName}" 
            loading="lazy" 
            width="800" height="800">`
    }
    ${extraCount > 0 && idx2 === 8 ? '<div class="more">+'+extraCount+'</div>' : ''}
</div>`;
            }
        });

        container.innerHTML += `
        <div class="product">
            <div class="product-title" onclick="openModal(${idx})">${prodName}</div>
            <div class="grid">${gridHTML}</div>
        </div>`;
    });

    document.getElementById('pageInfo').innerText = `Page ${currentPage} / ${Math.ceil(allProducts.length / perPage)}`;
    document.getElementById('prev').disabled = currentPage === 1;
    document.getElementById('next').disabled = currentPage === Math.ceil(allProducts.length/perPage);
}

function openModal(idx){
    const [name, medias] = currentPageProducts[idx];
    const content = document.getElementById('modalContent');
    content.innerHTML = `<h2 style="color:#fff;text-align:center;margin-bottom:20px">${name}</h2>`;

 medias.forEach(m => {
    if(m.mimeType.includes('video')){
        // 自动区分 Imgur 视频 / Google Drive 视频
        let videoHtml = '';
        
        // ===== Imgur 视频 =====
        if (m.isImgur) {
            videoHtml = `
            <div class="video-wrapper">
                <iframe 
                    src="https://imgur.com/${m.id}/embed?pub=true" 
                    scrolling="no"
                    frameborder="0"
                    allow="fullscreen"
                    allowfullscreen>
                </iframe>
            </div>`;
        }
        
        // ===== Google Drive 视频 =====
        else {
            videoHtml = `
            <div class="video-wrapper">
                <iframe 
                    src="https://drive.google.com/file/d/${m.id}/preview?autoplay=0&rel=0" 
                    allow="autoplay"
                    allowfullscreen>
                </iframe>
            </div>`;
        }

        content.innerHTML += videoHtml;
    }
});

    medias.forEach(m => {
        if(!m.mimeType.includes('video')){
            content.innerHTML += `
<div class="modal-media">
    ${m.isImgur 
        ? `<img 
            src="https://i.imgur.com/${m.id}.jpg" 
            alt="${name}">`
        : `<img 
            src="https://lh3.googleusercontent.com/d/${m.id}" 
            alt="${name}">`
    }
</div>`;
        }
    });

    document.getElementById('modal').style.display = 'block';
}

function closeModal(){
    document.getElementById('modal').style.display = 'none';
    document.getElementById('modalContent').innerHTML = '';
}

document.getElementById('prev').onclick = () => {
    if(currentPage>1){
        currentPage--;
        renderProducts();
        window.scrollTo({top:0, behavior:'smooth'});
    }
}
document.getElementById('next').onclick = () => {
    if(currentPage<Math.ceil(allProducts.length/perPage)){
        currentPage++;
        renderProducts();
        window.scrollTo({top:0, behavior:'smooth'});
    }
}

renderProducts();
</script>
</body>
</html>
